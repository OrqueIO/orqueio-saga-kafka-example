<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 620" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e74c3c"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#27ae60"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1400" height="620" fill="#f8f9fa" rx="10"/>

  <!-- Title -->
  <text x="700" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#2c3e50">Travel Booking Saga — BPMN Workflow (OrqueIO + Kafka)</text>

  <!-- ==================== ROW 1: HAPPY PATH ==================== -->

  <!-- Start Event -->
  <circle cx="60" cy="160" r="18" fill="#4CAF50" stroke="#2e7d32" stroke-width="2"/>
  <text x="60" y="165" text-anchor="middle" fill="white" font-size="11" font-weight="bold">▶</text>
  <text x="60" y="198" text-anchor="middle" font-size="10" fill="#555">Booking</text>
  <text x="60" y="210" text-anchor="middle" font-size="10" fill="#555">Received</text>

  <!-- Arrow Start → Book Flight -->
  <line x1="78" y1="160" x2="118" y2="160" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Book Flight Task -->
  <rect x="120" y="130" width="130" height="60" rx="8" fill="#3498db" stroke="#2980b9" stroke-width="2"/>
  <text x="185" y="155" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Book Flight</text>
  <text x="185" y="172" text-anchor="middle" fill="#d4e6f1" font-size="9">→ saga.flight.command</text>

  <!-- Arrow → Wait Flight -->
  <line x1="250" y1="160" x2="283" y2="160" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Wait Flight (Message Catch) -->
  <circle cx="300" cy="160" r="16" fill="white" stroke="#e67e22" stroke-width="2.5"/>
  <rect x="292" y="152" width="16" height="16" fill="none" stroke="#e67e22" stroke-width="1.5" rx="2"/>
  <text x="300" y="196" text-anchor="middle" font-size="9" fill="#555">Wait Flight</text>
  <text x="300" y="208" text-anchor="middle" font-size="9" fill="#555">Response</text>

  <!-- Arrow → Gateway Flight -->
  <line x1="316" y1="160" x2="348" y2="160" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Gateway Flight -->
  <polygon points="370,130 400,160 370,190 340,160" fill="#fff3cd" stroke="#f0ad4e" stroke-width="2"/>
  <text x="370" y="164" text-anchor="middle" fill="#856404" font-size="10" font-weight="bold">X</text>
  <text x="370" y="122" text-anchor="middle" font-size="9" fill="#555">Flight</text>
  <text x="370" y="112" text-anchor="middle" font-size="9" fill="#555">Booked?</text>

  <!-- Arrow Gateway → Book Hotel (Yes) -->
  <line x1="400" y1="160" x2="438" y2="160" stroke="#27ae60" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="418" y="152" text-anchor="middle" font-size="10" fill="#27ae60" font-weight="bold">Yes</text>

  <!-- Book Hotel Task -->
  <rect x="440" y="130" width="130" height="60" rx="8" fill="#3498db" stroke="#2980b9" stroke-width="2"/>
  <text x="505" y="155" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Book Hotel</text>
  <text x="505" y="172" text-anchor="middle" fill="#d4e6f1" font-size="9">→ saga.hotel.command</text>

  <!-- Arrow → Wait Hotel -->
  <line x1="570" y1="160" x2="603" y2="160" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Wait Hotel (Message Catch) -->
  <circle cx="620" cy="160" r="16" fill="white" stroke="#e67e22" stroke-width="2.5"/>
  <rect x="612" y="152" width="16" height="16" fill="none" stroke="#e67e22" stroke-width="1.5" rx="2"/>
  <text x="620" y="196" text-anchor="middle" font-size="9" fill="#555">Wait Hotel</text>
  <text x="620" y="208" text-anchor="middle" font-size="9" fill="#555">Response</text>

  <!-- Arrow → Gateway Hotel -->
  <line x1="636" y1="160" x2="668" y2="160" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Gateway Hotel -->
  <polygon points="690,130 720,160 690,190 660,160" fill="#fff3cd" stroke="#f0ad4e" stroke-width="2"/>
  <text x="690" y="164" text-anchor="middle" fill="#856404" font-size="10" font-weight="bold">X</text>
  <text x="690" y="122" text-anchor="middle" font-size="9" fill="#555">Hotel</text>
  <text x="690" y="112" text-anchor="middle" font-size="9" fill="#555">Booked?</text>

  <!-- Arrow Gateway → Rent Car (Yes) -->
  <line x1="720" y1="160" x2="758" y2="160" stroke="#27ae60" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="738" y="152" text-anchor="middle" font-size="10" fill="#27ae60" font-weight="bold">Yes</text>

  <!-- Rent Car Task -->
  <rect x="760" y="130" width="130" height="60" rx="8" fill="#3498db" stroke="#2980b9" stroke-width="2"/>
  <text x="825" y="155" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Rent Car</text>
  <text x="825" y="172" text-anchor="middle" fill="#d4e6f1" font-size="9">→ saga.car.command</text>

  <!-- Arrow → Wait Car -->
  <line x1="890" y1="160" x2="923" y2="160" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Wait Car (Message Catch) -->
  <circle cx="940" cy="160" r="16" fill="white" stroke="#e67e22" stroke-width="2.5"/>
  <rect x="932" y="152" width="16" height="16" fill="none" stroke="#e67e22" stroke-width="1.5" rx="2"/>
  <text x="940" y="196" text-anchor="middle" font-size="9" fill="#555">Wait Car</text>
  <text x="940" y="208" text-anchor="middle" font-size="9" fill="#555">Response</text>

  <!-- Arrow → Gateway Car -->
  <line x1="956" y1="160" x2="988" y2="160" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Gateway Car -->
  <polygon points="1010,130 1040,160 1010,190 980,160" fill="#fff3cd" stroke="#f0ad4e" stroke-width="2"/>
  <text x="1010" y="164" text-anchor="middle" fill="#856404" font-size="10" font-weight="bold">X</text>
  <text x="1010" y="122" text-anchor="middle" font-size="9" fill="#555">Car</text>
  <text x="1010" y="112" text-anchor="middle" font-size="9" fill="#555">Rented?</text>

  <!-- Arrow Gateway → End Success (Yes) -->
  <line x1="1040" y1="160" x2="1088" y2="160" stroke="#27ae60" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="1063" y="152" text-anchor="middle" font-size="10" fill="#27ae60" font-weight="bold">Yes</text>

  <!-- End Success -->
  <circle cx="1105" cy="160" r="18" fill="#27ae60" stroke="#1e8449" stroke-width="3"/>
  <text x="1105" y="165" text-anchor="middle" fill="white" font-size="14" font-weight="bold">✓</text>
  <text x="1105" y="198" text-anchor="middle" font-size="10" fill="#27ae60" font-weight="bold">Trip Booked</text>
  <text x="1105" y="210" text-anchor="middle" font-size="10" fill="#27ae60" font-weight="bold">Successfully</text>

  <!-- ==================== ROW 2: FAILURE PATHS ==================== -->

  <!-- Arrow Gateway Flight → End Flight Failed (No) -->
  <line x1="370" y1="190" x2="370" y2="308" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowRed)"/>
  <text x="382" y="240" font-size="10" fill="#e74c3c" font-weight="bold">No</text>

  <!-- End Flight Failed -->
  <circle cx="370" cy="325" r="18" fill="#e74c3c" stroke="#c0392b" stroke-width="3"/>
  <text x="370" y="330" text-anchor="middle" fill="white" font-size="14" font-weight="bold">✗</text>
  <text x="370" y="360" text-anchor="middle" font-size="10" fill="#e74c3c" font-weight="bold">Flight</text>
  <text x="370" y="372" text-anchor="middle" font-size="10" fill="#e74c3c" font-weight="bold">Unavailable</text>
  <text x="370" y="390" text-anchor="middle" font-size="9" fill="#888">(no compensation)</text>

  <!-- Arrow Gateway Hotel → Cancel Flight (No) -->
  <line x1="690" y1="190" x2="690" y2="308" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowRed)"/>
  <text x="702" y="240" font-size="10" fill="#e74c3c" font-weight="bold">No</text>

  <!-- Cancel Flight (from Hotel failure) -->
  <rect x="625" y="310" width="130" height="55" rx="8" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
  <text x="690" y="333" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Cancel Flight</text>
  <text x="690" y="350" text-anchor="middle" fill="#fadbd8" font-size="9">COMPENSATE</text>

  <!-- Arrow Cancel Flight → End Hotel Failed -->
  <line x1="755" y1="337" x2="793" y2="337" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowRed)"/>

  <!-- End Hotel Failed -->
  <circle cx="810" cy="337" r="18" fill="#e74c3c" stroke="#c0392b" stroke-width="3"/>
  <text x="810" y="342" text-anchor="middle" fill="white" font-size="14" font-weight="bold">✗</text>
  <text x="810" y="372" text-anchor="middle" font-size="10" fill="#e74c3c" font-weight="bold">Hotel Unavailable</text>
  <text x="810" y="384" text-anchor="middle" font-size="9" fill="#888">(flight compensated)</text>

  <!-- Arrow Gateway Car → Cancel Hotel (No) -->
  <line x1="1010" y1="190" x2="1010" y2="308" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowRed)"/>
  <text x="1022" y="240" font-size="10" fill="#e74c3c" font-weight="bold">No</text>

  <!-- Cancel Hotel (from Car failure) -->
  <rect x="945" y="310" width="130" height="55" rx="8" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
  <text x="1010" y="333" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Cancel Hotel</text>
  <text x="1010" y="350" text-anchor="middle" fill="#fadbd8" font-size="9">COMPENSATE</text>

  <!-- Arrow Cancel Hotel → Cancel Flight -->
  <line x1="1010" y1="365" x2="1010" y2="428" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowRed)"/>

  <!-- Cancel Flight (from Car failure) -->
  <rect x="945" y="430" width="130" height="55" rx="8" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
  <text x="1010" y="453" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Cancel Flight</text>
  <text x="1010" y="470" text-anchor="middle" fill="#fadbd8" font-size="9">COMPENSATE</text>

  <!-- Arrow Cancel Flight → End Car Failed -->
  <line x1="1075" y1="457" x2="1113" y2="457" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowRed)"/>

  <!-- End Car Failed -->
  <circle cx="1130" cy="457" r="18" fill="#e74c3c" stroke="#c0392b" stroke-width="3"/>
  <text x="1130" y="462" text-anchor="middle" fill="white" font-size="14" font-weight="bold">✗</text>
  <text x="1130" y="492" text-anchor="middle" font-size="10" fill="#e74c3c" font-weight="bold">Car Unavailable</text>
  <text x="1130" y="504" text-anchor="middle" font-size="9" fill="#888">(hotel + flight compensated)</text>

  <!-- ==================== LEGEND ==================== -->
  <rect x="30" y="530" width="1340" height="75" rx="8" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="50" y="555" font-size="12" font-weight="bold" fill="#333">Legend:</text>

  <!-- Start -->
  <circle cx="130" cy="568" r="10" fill="#4CAF50" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="150" y="572" font-size="11" fill="#555">Start Event</text>

  <!-- Service Task -->
  <rect x="230" y="558" width="60" height="20" rx="4" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="300" y="572" font-size="11" fill="#555">Service Task (Kafka Command)</text>

  <!-- Message Catch -->
  <circle cx="510" cy="568" r="10" fill="white" stroke="#e67e22" stroke-width="2"/>
  <text x="530" y="572" font-size="11" fill="#555">Message Catch Event (Async Wait)</text>

  <!-- Gateway -->
  <polygon points="750,558 765,568 750,578 735,568" fill="#fff3cd" stroke="#f0ad4e" stroke-width="1.5"/>
  <text x="775" y="572" font-size="11" fill="#555">Exclusive Gateway (Decision)</text>

  <!-- Compensation -->
  <rect x="950" y="558" width="60" height="20" rx="4" fill="#e74c3c" stroke="#c0392b" stroke-width="1.5"/>
  <text x="1020" y="572" font-size="11" fill="#555">Compensation Task</text>

  <!-- End -->
  <circle cx="1180" cy="568" r="10" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <circle cx="1210" cy="568" r="10" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
  <text x="1230" y="572" font-size="11" fill="#555">End Events</text>
</svg>
